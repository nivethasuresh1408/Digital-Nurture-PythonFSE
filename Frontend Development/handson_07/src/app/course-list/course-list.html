<h2>Available Courses</h2>

<input
  type="text"
  placeholder="Search Courses..."
  [(ngModel)]="searchTerm">

<br><br>

<div *ngIf="loading">
  Loading Courses...
</div>

<div *ngIf="!loading">

  <app-course-card
    *ngFor="let course of filteredCourses"
    [name]="course.name"
    [code]="course.code"
    [credits]="course.credits"
    [grade]="course.grade">
  </app-course-card>

  <div *ngIf="filteredCourses.length === 0">
    No courses found
  </div>

</div>
